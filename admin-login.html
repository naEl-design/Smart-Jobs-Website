<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    /* Style for admin login page */
    body {
      background: linear-gradient(135deg, #0f0a3a 0%, #3b2fc9 60%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: system-ui;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 350px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      background: #3b2fc9;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
    }
    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 Admin Access Only</h2>
    <p>Enter password to continue</p>
    <input type="password" id="adminPass" placeholder="Admin password">
    <button onclick="checkPassword()">Login</button>
    <a href="home.html" style="display: block; margin-top: 15px; color: #666;">← Back to Home</a>
  </div>

  <script>
    function checkPassword() {
      const password = document.getElementById('adminPass').value;
      if (password === 'admin123') {
        sessionStorage.setItem('adminAuthenticated', 'true');
        window.location.href = 'admin.html';
      } else {
        alert('⚠️ ONLY FOR ADMIN! Access denied. ⚠️');
        document.getElementById('adminPass').value = '';
      }
    }
  </script>
</body>
</html>
