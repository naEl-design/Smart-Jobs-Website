<!-- forgot-password.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="9RkpIDPFQLY-tXviL2wdqDg_1IO1V50sdk5fTG1ur98" />
  <title>Forgot Password | smartJobs Rwanda</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <script src="cursor.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --indigo: #3b2fc9;
      --indigo-dark: #2a1fa8;
      --indigo-light: #ede9ff;
      --emerald: #10b981;
      --emerald-dark: #059669;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #0f0a3a 0%, #3b2fc9 55%, #6d51f7 100%);
    }
    .reset-container { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      width: 100%; 
      padding: 20px; 
    }
    .reset-card { 
      background: white; 
      border-radius: 24px; 
      padding: 48px; 
      width: 100%; 
      max-width: 450px; 
      text-align: center; 
      animation: fadeSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; 
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }
    @keyframes fadeSlideUp { 
      from { opacity: 0; transform: translateY(40px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    .logo { margin-bottom: 24px; }
    .sj-logo-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #3b2fc9, #5a44e8);
      border-radius: 40px; padding: 8px 20px 8px 10px;
      text-decoration: none; font-family: 'Sora', sans-serif;
      font-weight: 800; font-size: 1.2rem; color: white;
      box-shadow: 0 4px 16px rgba(59,47,201,0.3);
    }
    .sj-icon { width: 32px; height: 32px; background: rgba(255,255,255,.18); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .sj-green { color: #10b981; }
    .reset-card h2 { font-size: 1.8rem; font-family: 'Sora', sans-serif; margin-bottom: 10px; }
    .reset-card p { color: var(--muted); margin-bottom: 30px; font-size: 0.9rem; }
    .input-field { margin-bottom: 20px; text-align: left; }
    .input-field label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--text); font-size: 0.85rem; }
    .input-field input { 
      width: 100%; padding: 14px 16px; 
      border: 1.5px solid var(--border); 
      border-radius: 12px; 
      font-size: 0.95rem; 
      outline: none; 
      transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .input-field input:focus { border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(59,47,201,0.1); }
    .btn-reset { 
      width: 100%; padding: 14px; 
      background: linear-gradient(135deg, var(--indigo), #6d51f7); 
      color: white; border: none; 
      border-radius: 12px; 
      font-weight: 700; 
      font-size: 1rem; 
      cursor: pointer; 
      transition: all 0.2s;
      font-family: 'Sora', sans-serif;
    }
    .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,47,201,0.35); }
    .btn-reset:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .back-link { 
      margin-top: 24px; 
      display: inline-block; 
      color: var(--muted); 
      text-decoration: none; 
      font-size: 0.85rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--indigo); }
    .message-box {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      display: none;
      animation: fadeSlideUp 0.3s ease;
    }
    .message-box.success { background: #d1fae5; color: #065f46; border-left: 4px solid var(--emerald); }
    .message-box.error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 480px) { .reset-card { padding: 32px 24px; } .reset-card h2 { font-size: 1.5rem; } }
  </style>
  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
<div class="reset-container">
  <div class="reset-card">
    <div class="logo">
      <a href="home.html" class="sj-logo-pill">
        <span class="sj-icon"><i class="fas fa-arrow-up"></i></span>
        <span class="sj-text">smart<span class="sj-green">Jobs</span></span>
      </a>
    </div>
    <h2>Forgot Password?</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>
    
    <form id="resetForm" onsubmit="handleReset(event)">
      <div class="input-field">
        <label>Email Address</label>
        <input type="email" id="reset-email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn-reset" id="resetBtn">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>
    </form>
    
    <div id="messageBox" class="message-box"></div>
    
    <a href="auth.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
  </div>
</div>

<script>
  // Initialize EmailJS with your public key
  // You need to sign up at emailjs.com and replace this with your actual public key
  // For demo purposes, we'll also show a fallback message
  
  let emailJSInitialized = false;
  
  // Try to initialize EmailJS with your key (replace with your actual key)
  // Sign up at https://www.emailjs.com/ - it's free for up to 200 emails/month
  const YOUR_EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY_HERE"; // REPLACE THIS
  
  if (YOUR_EMAILJS_PUBLIC_KEY && YOUR_EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY_HERE") {
    try {
      emailjs.init(YOUR_EMAILJS_PUBLIC_KEY);
      emailJSInitialized = true;
      console.log("EmailJS initialized successfully");
    } catch(e) {
      console.warn("EmailJS init failed:", e);
    }
  }
  
  // Helper to show message
  function showMessage(msg, type) {
    const msgBox = document.getElementById('messageBox');
    msgBox.textContent = msg;
    msgBox.className = `message-box ${type}`;
    msgBox.style.display = 'block';
    setTimeout(() => {
      msgBox.style.display = 'none';
    }, 5000);
  }
  
  // Generate a reset token
  function generateResetToken(email) {
    const timestamp = Date.now();
    const random = Math.random().toString(36).substring(2, 15);
    return btoa(`${email}|${timestamp}|${random}`).replace(/[^a-zA-Z0-9]/g, '');
  }
  
  // Store reset request
  function storeResetRequest(email, token) {
    const resetRequests = JSON.parse(localStorage.getItem('passwordResetRequests') || '{}');
    resetRequests[token] = {
      email: email,
      createdAt: Date.now(),
      expiresAt: Date.now() + 3600000 // 1 hour expiry
    };
    localStorage.setItem('passwordResetRequests', JSON.stringify(resetRequests));
  }
  
  // Send email using EmailJS (or fallback to simulation)
  async function sendResetEmail(email, resetLink) {
    // If EmailJS is configured, use it
    if (emailJSInitialized) {
      try {
        const templateParams = {
          to_email: email,
          reset_link: resetLink,
          site_name: "smartJobs Rwanda",
          year: new Date().getFullYear()
        };
        
        // You need to create an email template in EmailJS and replace these IDs
        // Service ID, Template ID - replace with your actual IDs
        const serviceId = "service_smartjobs";
        const templateId = "template_password_reset";
        
        const response = await emailjs.send(serviceId, templateId, templateParams);
        if (response.status === 200) {
          return { success: true, message: "Reset link sent to your email!" };
        } else {
          throw new Error("Email send failed");
        }
      } catch (error) {
        console.error("EmailJS error:", error);
        // Fallback to simulation
        return fallbackSendEmail(email, resetLink);
      }
    } else {
      // Fallback: simulate email sending for demo
      return fallbackSendEmail(email, resetLink);
    }
  }
  
  // Fallback for demo/development
  function fallbackSendEmail(email, resetLink) {
    // Store the reset link in localStorage for demo purposes
    console.log("DEMO MODE: Reset link would be sent to:", email);
    console.log("Reset link:", resetLink);
    
    // For demo, also store in a "sent emails" log
    const sentEmails = JSON.parse(localStorage.getItem('sentResetEmails') || '[]');
    sentEmails.push({
      to: email,
      link: resetLink,
      sentAt: new Date().toISOString()
    });
    localStorage.setItem('sentResetEmails', JSON.stringify(sentEmails.slice(-10)));
    
    return { 
      success: true, 
      message: "Reset link generated! Check console or demo@smartjobs.rw (DEMO MODE)" 
    };
  }
  
  async function handleReset(e) {
    e.preventDefault();
    
    const email = document.getElementById('reset-email').value.trim();
    const btn = document.getElementById('resetBtn');
    const originalText = btn.innerHTML;
    
    if (!email) {
      showMessage('Please enter your email address', 'error');
      return;
    }
    
    if (!email.includes('@') || !email.includes('.')) {
      showMessage('Please enter a valid email address', 'error');
      return;
    }
    
    // Check if email exists in registered users
    const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
    const userExists = users.some(u => u.email === email);
    
    if (!userExists) {
      // For security, don't reveal if email doesn't exist - just show generic message
      showMessage('If an account exists with this email, we\'ve sent a reset link.', 'success');
      document.getElementById('reset-email').value = '';
      return;
    }
    
    // Disable button
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Sending...';
    
    // Generate reset token and link
    const token = generateResetToken(email);
    storeResetRequest(email, token);
    
    // Get the base URL (works locally or on server)
    const baseUrl = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
    const resetLink = `${baseUrl}reset-password.html?token=${encodeURIComponent(token)}`;
    
    try {
      const result = await sendResetEmail(email, resetLink);
      
      if (result.success) {
        showMessage(result.message, 'success');
        document.getElementById('reset-email').value = '';
      } else {
        showMessage('Failed to send email. Please try again later.', 'error');
      }
    } catch (error) {
      console.error('Error sending email:', error);
      showMessage('Something went wrong. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  }
  
  // Pre-fill email if passed via URL (from login page)
  const urlParams = new URLSearchParams(window.location.search);
  const prefilledEmail = urlParams.get('email');
  if (prefilledEmail) {
    document.getElementById('reset-email').value = prefilledEmail;
  }
</script>
</body>
</html>
