<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | smartJobs Rwanda</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --indigo: #3b2fc9;
      --emerald: #10b981;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --bg: #f8fafc;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #0f0a3a 0%, #3b2fc9 55%, #6d51f7 100%);
    }
    .reset-container { display: flex; align-items: center; justify-content: center; width: 100%; padding: 20px; }
    .reset-card { background: white; border-radius: 24px; padding: 48px; width: 100%; max-width: 450px; text-align: center; animation: fadeSlideUp 0.5s ease; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .logo { margin-bottom: 30px; }
    .sj-logo-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #3b2fc9, #5a44e8);
      border-radius: 40px; padding: 8px 20px 8px 10px;
      text-decoration: none; font-family: 'Sora', sans-serif;
      font-weight: 800; font-size: 1.2rem; color: white;
    }
    .sj-icon { width: 32px; height: 32px; background: rgba(255,255,255,.18); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .sj-green { color: #10b981; }
    .reset-card h2 { font-size: 1.8rem; margin-bottom: 10px; }
    .reset-card p { color: var(--muted); margin-bottom: 30px; font-size: 0.9rem; }
    .input-field { margin-bottom: 20px; text-align: left; }
    .input-field label { display: block; font-weight: 600; margin-bottom: 8px; }
    .input-field input { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 0.95rem; outline: none; transition: all 0.2s; }
    .input-field input:focus { border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(59,47,201,0.1); }
    .btn-reset { width: 100%; padding: 14px; background: var(--indigo); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
    .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(59,47,201,0.3); }
    .back-link { margin-top: 20px; display: block; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--indigo); }
  </style>
</head>
<body>
<div class="reset-container">
  <div class="reset-card">
    <div class="logo"><a href="home.html" class="sj-logo-pill"><span class="sj-icon"><i class="fas fa-arrow-up"></i></span><span class="sj-text">smart<span class="sj-green">Jobs</span></span></a></div>
    <h2>Forgot Password?</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>
    <form id="resetForm" onsubmit="handleReset(event)">
      <div class="input-field"><label>Email Address</label><input type="email" id="reset-email" placeholder="you@example.com" required></div>
      <button type="submit" class="btn-reset">Send Reset Link</button>
    </form>
    <a href="auth.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
  </div>
</div>
<script>
  function handleReset(e) {
    e.preventDefault();
    const email = document.getElementById('reset-email').value;
    alert(`A password reset link has been sent to ${email}\n\n(Note: This is a demo. In production, this would send a real email.)`);
    document.getElementById('resetForm').reset();
  }
</script>
</body>
</html>
