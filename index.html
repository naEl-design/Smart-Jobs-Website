<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>smartJobs Rwanda</title>
  <style>
    body { margin:0; background:#3b2fc9; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'Segoe UI',sans-serif; flex-direction:column; gap:24px; }
    .logo { font-size:2.8rem; font-weight:900; color:white; letter-spacing:-1px; }
    .logo span { color:#10b981; }
    p { color:rgba(255,255,255,.7); font-size:1rem; }
  </style>
</head>
<body>
  <div class="logo">smart<span>Jobs</span></div>
  <p>Redirecting you…</p>
  <script>
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (user) {
      if (user.role === 'Job Seeker') window.location.href = 'home.html';
      else if (user.role === 'Employer') window.location.href = 'employer-dashboard.html';
      else window.location.href = 'admin.html';
    } else {
      window.location.href = 'home.html';
    }
  </script>
<script src="animations.js"></script>
</body>
</html>
